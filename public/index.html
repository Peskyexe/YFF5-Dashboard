<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles/index.css">
    <script src="scripts/modules.js" type="module" defer></script>
    <script src="scripts/presets.js" type="module" defer></script>
    <script src="scripts/theme_toggle.js" defer></script>
    <!-- Dropdown menyen fra YFF 4 -->
    <link rel="stylesheet" href="styles/dropdown.css">
    <script src="scripts/utilities/drop_down.js" defer></script>
</head>
<body>
    <header>
        <h1>Dashboard</h1>
    </header>
    <nav>
        <section>
            <div>
                <button id="theme-button"><i class="fa-solid fa-circle-half-stroke"></i></button>
                <div class="dropdown-wrapper" id="team-algorithm-input">
                    <div class="dropdown-button">
                        <span class="dropdown-selected-item">Preset</span>
                        <span><i class="fa-solid fa-caret-up"></i></span>
                    </div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item dropdown-active" data-value="0">Default</div>
                        <div class="dropdown-item" data-value="1">Custom 1</div>
                        <div class="dropdown-item" data-value="2">Custom 2</div>
                        <div class="dropdown-item" data-value="3">Testing</div>
                    </div>
                </div>
            </div>
        </section>
    </nav>
    <main>
        <!-- Hvor modulene går -->
        <section class="module-container">
            
        </section>
    </main>
</body>
</html>
